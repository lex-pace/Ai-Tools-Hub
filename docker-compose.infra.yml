# ============================================================
# AI Tools Hub — 基础设施组件（不含前后端服务）
# 用法: DOCKER_HOST= docker compose -f docker-compose.infra.yml up -d
#
# 端口规划（避免与宿主机已有服务冲突）:
#   PostgreSQL:       15432 (宿主机) → 5432 (容器内)
#   Elasticsearch:    19200 (宿主机) → 9200 (容器内)
#   Redis:            16379 (宿主机) → 6379 (容器内)
#   Nginx:            3080  (宿主机) → 80   (容器内)
# ============================================================

services:

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tools
      POSTGRES_PASSWORD: tools123
      POSTGRES_DB: tools_hub
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "15432:5432"
    deploy:
      resources:
        limits:
          memory: 384M
    command: >
      postgres
      -c shared_buffers=192MB
      -c max_connections=50
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tools -d tools_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tools-net

  # ==================== Elasticsearch (含 IK 中文分词) ====================
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: tools-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=tools-hub
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "19200:9200"
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tools-net

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: tools-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "16379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tools-net

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: tools-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/usr/share/nginx/uploads:ro
    ports:
      - "3080:80"
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - tools-net

networks:
  tools-net:
    driver: bridge
